<app-notification
  *ngIf="notification.show"
  [message]="notification.message"
  [type]="notification.type"
  (closed)="notification.show = false"
></app-notification>

<div class="password-page">
  <div class="password-card">
    <h2>Đổi mật khẩu</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span class="label">Mật khẩu cũ</span>
        <div class="password-wrap">
          <input
            class="input"
            [type]="showOldPassword ? 'text' : 'password'"
            formControlName="oldPassword"
            placeholder="Nhập mật khẩu cũ"
            [disabled]="submitting"
          />
          <button
            class="btn-eye"
            type="button"
            (click)="toggleOldPassword()"
            [attr.aria-label]="showOldPassword ? 'Ẩn mật khẩu cũ' : 'Hiện mật khẩu cũ'"
            [disabled]="submitting"
          >
            <svg *ngIf="!showOldPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showOldPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
              <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
              <path d="M1 1l22 22" />
            </svg>
          </button>
        </div>
      </label>

      <label class="field">
        <span class="label">Mật khẩu mới</span>
        <div class="password-wrap">
          <input
            class="input"
            [type]="showNewPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder="Nhập mật khẩu mới"
            [disabled]="submitting"
          />
          <button
            class="btn-eye"
            type="button"
            (click)="toggleNewPassword()"
            [attr.aria-label]="showNewPassword ? 'Ẩn mật khẩu mới' : 'Hiện mật khẩu mới'"
            [disabled]="submitting"
          >
            <svg *ngIf="!showNewPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showNewPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
              <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
              <path d="M1 1l22 22" />
            </svg>
          </button>
        </div>
      </label>

      <button class="btn-submit" type="submit" [disabled]="submitting">
        {{ submitting ? 'Đang cập nhật...' : 'Cập nhật mật khẩu' }}
      </button>
    </form>
  </div>
</div>
