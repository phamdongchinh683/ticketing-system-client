<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal" (click)="stopPropagation($event)">
    <h3>{{ editingCompany ? 'Edit Company' : 'Add Bus Company' }}</h3>
    <form class="modal-body" [formGroup]="form" (ngSubmit)="submitted.emit()">
      <label class="field">
        <span class="field-label">Name</span>
        <input class="modal-input" formControlName="name" placeholder="Company name" />
      </label>
      <label class="field">
        <span class="field-label">Hotline</span>
        <input class="modal-input" formControlName="hotline" placeholder="e.g. 0987654321" />
      </label>
      <div class="field">
        <span class="field-label">Logo</span>
        <input type="hidden" formControlName="logoUrl" />
        <div class="logo-upload">
          <img
            *ngIf="logoPreviewUrl"
            class="logo-preview"
            [src]="logoPreviewUrl"
            alt=""
          />
          <div class="logo-upload-actions">
            <button
              class="btn-upload"
              type="button"
              [disabled]="!canUploadLogo || uploadingLogo"
              (click)="triggerLogoFileInput(logoFileInput)"
            >
              {{ uploadingLogo ? 'Uploading…' : 'Upload logo' }}
            </button>
            <input
              #logoFileInput
              type="file"
              class="sr-only"
              accept="image/*"
              (change)="onLogoFileChange($event)"
            />
          </div>
          <p *ngIf="!canUploadLogo" class="field-hint">
            Save the company first, then edit it to upload a logo (upload needs a company id).
          </p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" type="button" (click)="close()">Cancel</button>
        <button class="btn-submit" type="submit" [disabled]="submitting">
          {{ submitting ? 'Saving...' : (editingCompany ? 'Update' : 'Create') }}
        </button>
      </div>
    </form>
  </div>
</div>
