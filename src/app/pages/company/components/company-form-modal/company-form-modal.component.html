<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal" (click)="stopPropagation($event)">
    <h3>{{ editingCompany ? 'Edit Company' : 'Add Bus Company' }}</h3>
    <form class="modal-body" [formGroup]="form" (ngSubmit)="submitted.emit()">
      <label class="field">
        <span class="field-label">Name</span>
        <input class="modal-input" formControlName="name" placeholder="Company name" />
      </label>
      <label class="field">
        <span class="field-label">Hotline</span>
        <input class="modal-input" formControlName="hotline" placeholder="e.g. 0987654321" />
      </label>
      <label class="field">
        <span class="field-label">Logo URL</span>
        <input class="modal-input" formControlName="logoUrl" placeholder="https://..." />
      </label>
      <div class="modal-footer">
        <button class="btn-cancel" type="button" (click)="close()">Cancel</button>
        <button class="btn-submit" type="submit" [disabled]="submitting">
          {{ submitting ? 'Saving...' : (editingCompany ? 'Update' : 'Create') }}
        </button>
      </div>
    </form>
  </div>
</div>
