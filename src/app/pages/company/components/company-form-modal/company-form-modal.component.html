<div class="modal-overlay" [class.modal-overlay--open]="open" [attr.aria-hidden]="!open" (click)="close()">
  <div class="modal" (click)="stopPropagation($event)">
    <h3>{{ editingCompany ? 'Chỉnh sửa nhà xe' : 'Thêm nhà xe' }}</h3>
    <form class="modal-body" [formGroup]="form" (ngSubmit)="submitted.emit()">
      <label class="field">
        <span class="field-label">Tên</span>
        <input class="modal-input" formControlName="name" placeholder="Tên nhà xe" />
      </label>
      <label class="field">
        <span class="field-label">Hotline</span>
        <input class="modal-input" formControlName="hotline" placeholder="vd: 0987654321" />
      </label>
      <label class="field">
        <span class="field-label">Địa chỉ</span>
        <input type="hidden" formControlName="latitude" />
        <input type="hidden" formControlName="longitude" />
        <div class="address-row">
          <input
            class="modal-input"
            formControlName="address"
            placeholder="Số nhà, đường, quận, tỉnh"
            (input)="onAddressInput()"
            (blur)="findCoordinatesFromAddress()"
          />
          <button class="btn-geo" type="button" [disabled]="resolvingFromAddress" (click)="findCoordinatesFromAddress()">
            {{ resolvingFromAddress ? 'Đang kiểm tra...' : 'Kiểm tra' }}
          </button>
        </div>
        <div *ngIf="hasCoordinates" class="map-preview">
          <iframe
            title="Bản đồ vị trí địa chỉ"
            [src]="mapEmbedUrl"
            loading="lazy"
          ></iframe>
        </div>
      </label>
      <div class="field">
        <span class="field-label">Logo</span>
        <input type="hidden" formControlName="logoUrl" />
        <div class="logo-upload">
          <img *ngIf="logoPreviewUrl" class="logo-preview" [src]="logoPreviewUrl" alt="" />
          <div class="logo-upload-actions">
            <button
              class="btn-upload"
              type="button"
              [disabled]="!canUploadLogo || uploadingLogo"
              (click)="triggerLogoFileInput(logoFileInput)"
            >
              {{ uploadingLogo ? 'Đang tải lên…' : 'Tải logo lên' }}
            </button>
            <input
              #logoFileInput
              type="file"
              class="sr-only"
              accept="image/*"
              title="Chọn file logo"
              aria-label="Chọn file logo"
              (change)="onLogoFileChange($event)"
            />
          </div>
          <p *ngIf="!canUploadLogo" class="field-hint">
            Vui lòng lưu nhà xe trước, sau đó chỉnh sửa để tải logo lên.
          </p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" type="button" (click)="close()">Hủy</button>
        <button class="btn-submit" type="submit" [disabled]="submitting || uploadingLogo">
          {{ submitting ? 'Đang lưu...' : uploadingLogo ? 'Đang tải logo...' : editingCompany ? 'Cập nhật' : 'Tạo mới' }}
        </button>
      </div>
    </form>
  </div>
</div>
