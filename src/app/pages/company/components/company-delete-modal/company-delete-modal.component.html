<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal modal--sm" (click)="stopPropagation($event)">
    <h3>Delete Company</h3>
    <p class="delete-msg">Are you sure you want to delete <strong>{{ company?.name }}</strong>?</p>
    <div class="modal-footer">
      <button class="btn-cancel" type="button" (click)="close()">Cancel</button>
      <button class="btn-danger" type="button" [disabled]="submitting" (click)="confirm.emit()">
        {{ submitting ? 'Deleting...' : 'Delete' }}
      </button>
    </div>
  </div>
</div>
