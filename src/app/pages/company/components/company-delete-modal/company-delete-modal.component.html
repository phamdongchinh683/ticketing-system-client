<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal modal--sm" (click)="stopPropagation($event)">
    <h3>Xóa nhà xe</h3>
    <p class="delete-msg">Bạn có chắc chắn muốn xóa <strong>{{ company?.name }}</strong>?</p>
    <div class="modal-footer">
      <button class="btn-cancel" type="button" (click)="close()">Hủy</button>
      <button class="btn-danger" type="button" [disabled]="submitting" (click)="confirm.emit()">
        {{ submitting ? 'Đang xóa...' : 'Xóa' }}
      </button>
    </div>
  </div>
</div>
