<app-notification
  *ngIf="notification.show"
  [message]="notification.message"
  [type]="notification.type"
  (closed)="notification.show = false"
></app-notification>

<div class="page">
  <div class="page-header">
    <h2>Companies</h2>

    <app-company-toolbar
      [searchName]="searchName"
      [limit]="limit"
      [pageLimits]="pageLimits"
      (searchNameChange)="onSearchInput($event)"
      (limitChange)="onLimitChange($event)"
      (addClick)="openCreateModal()"
    ></app-company-toolbar>
  </div>

  <app-company-form-modal
    [open]="showModal"
    [form]="companyForm"
    [editingCompany]="editingCompany"
    [submitting]="submitting"
    (closed)="closeModal()"
    (submitted)="onSubmit()"
  ></app-company-form-modal>

  <app-company-delete-modal
    [open]="showDeleteConfirm"
    [company]="deletingCompany"
    [submitting]="submitting"
    (closed)="cancelDelete()"
    (confirm)="onConfirmDelete()"
  ></app-company-delete-modal>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <div *ngIf="!loading" class="page-body">
    <app-company-list
      [companies]="companies"
      (editCompany)="onEdit($event)"
      (deleteCompany)="onDelete($event)"
    ></app-company-list>

    <div class="pagination">
      <button
        class="btn-load-more"
        type="button"
        [disabled]="nextCursor === null || loadingMore"
        (click)="loadMore()"
      >
        {{ nextCursor !== null ? 'Next' : 'No more data' }}
      </button>
    </div>

    <div *ngIf="loadingMore" class="loading">
      <div class="spinner"></div>
      <p>Loading more...</p>
    </div>
  </div>
</div>
