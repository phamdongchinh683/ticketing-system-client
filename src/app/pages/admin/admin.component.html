<app-notification
  *ngIf="notification.show"
  [message]="notification.message"
  [type]="notification.type"
  (closed)="notification.show = false"
></app-notification>

<div class="page">
  <div class="page-header">
    <h2>Tài khoản công ty</h2>
    <app-company-admin-toolbar
      [limit]="limit"
      [pageLimits]="pageLimits"
      [companies]="companies"
      [selectedCompanyId]="selectedCompanyId"
      (limitChange)="onLimitChange($event)"
      (companyFilterChange)="onCompanyFilterChange($event)"
      (createClick)="openCreate()"
    ></app-company-admin-toolbar>
  </div>

  <app-company-admin-table
    [admins]="admins"
    [loading]="loading"
    (updateClick)="onUpdateClick($event)"
    (notifyClick)="openNotificationModal($event)"
  ></app-company-admin-table>

  <div class="pagination" *ngIf="!loading && admins.length > 0">
    <button class="btn-load-more" [disabled]="nextCursor === null || loadingMore" type="button" (click)="loadMore()">
      {{ nextCursor !== null ? (loadingMore ? 'Đang tải...' : 'Tiếp theo') : 'Không còn dữ liệu' }}
    </button>
  </div>
</div>

<app-company-admin-create-modal
  [open]="showCreate"
  (openChange)="onCreateOpenChange($event)"
  [companies]="companies"
  [submitting]="createSubmitting"
  (submitted)="onCreateSubmit($event)"
  (validateFailed)="onCreateValidateFailed($event)"
></app-company-admin-create-modal>

<app-company-admin-edit-modal
  [open]="showEdit"
  (openChange)="onEditOpenChange($event)"
  [admin]="editingAdmin"
  [submitting]="editSubmitting"
  (submitted)="onEditSubmit($event)"
  (validateFailed)="showNotification($event, 'warning')"
></app-company-admin-edit-modal>

<app-user-notification-modal
  [open]="showNotificationModal"
  [submitting]="notificationSubmitting"
  (closed)="closeNotificationModal()"
  (submitted)="submitNotification($event)"
></app-user-notification-modal>
