<div class="toolbar">
  <select class="limit-select" [ngModel]="limit" (ngModelChange)="limitChange.emit($event)" name="adminLimit">
    @for (l of pageLimits; track l) {
      <option [ngValue]="l">{{ l }}</option>
    }
  </select>

  <button class="btn-add" type="button" (click)="createClick.emit()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19" />
      <line x1="5" y1="12" x2="19" y2="12" />
    </svg>
    Create account
  </button>
</div>
