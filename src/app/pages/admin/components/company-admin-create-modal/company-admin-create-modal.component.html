<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>Create company account</h3>
    <form class="modal-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="field">
        <span class="label">Username</span>
        <input class="input" formControlName="username" autocomplete="username" placeholder="username" />
        <span class="error" *ngIf="usernameError">{{ usernameError }}</span>
      </label>
      <label class="field">
        <span class="label">Full name</span>
        <input class="input" formControlName="fullName" placeholder="min 7 characters" autocomplete="name" />
        <span class="error" *ngIf="fullNameError">{{ fullNameError }}</span>
      </label>
      <label class="field">
        <span class="label">Email</span>
        <input class="input" formControlName="email" type="email" autocomplete="email" placeholder="email@example.com" />
        <span class="error" *ngIf="emailError">{{ emailError }}</span>
      </label>
      <label class="field">
        <span class="label">Phone</span>
        <input class="input" formControlName="phone" placeholder="11 digits" autocomplete="tel" />
        <span class="error" *ngIf="phoneError">{{ phoneError }}</span>
      </label>
      <label class="field">
        <span class="label">Password</span>
        <div class="password-wrap">
          <input
            class="input password-input"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Abcd12345#"
          />
          <button class="btn-eye" type="button" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Hide' : 'Show'">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
              <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
              <path d="M1 1l22 22" />
            </svg>
          </button>
        </div>
        <span class="error" *ngIf="passwordError">{{ passwordError }}</span>
      </label>
      <label class="field field--full">
        <span class="label">Company</span>
        <select class="select" formControlName="companyId">
          <option [ngValue]="null">Select company</option>
          @for (c of companies; track c.id) {
            <option [ngValue]="c.id">{{ c.name }}</option>
          }
        </select>
        <span class="error" *ngIf="companyError">{{ companyError }}</span>
      </label>
      <div class="modal-actions">
        <button class="btn btn--ghost" type="button" (click)="close()">Cancel</button>
        <button class="btn" type="submit" [disabled]="submitting">{{ submitting ? 'Creating...' : 'Create' }}</button>
      </div>
    </form>
  </div>
</div>
