<app-notification
  *ngIf="notification.show"
  [message]="notification.message"
  [type]="notification.type"
  (closed)="notification.show = false"
/>

<div class="page">
  <div class="page-header">
    <div>
      <h2>FCM Token thiết bị</h2>
      <p class="subtitle">Quản lý FCM token đã đăng ký cho tài khoản này.</p>
    </div>

    <div class="header-actions">
      <button type="button" class="btn btn-secondary" [disabled]="loading" (click)="fetchTokens()">Làm mới</button>
      <button type="button" class="btn btn-primary" [disabled]="registering" (click)="registerCurrentDevice()">
        {{ registering ? 'Đang đăng ký...' : 'Thêm thiết bị' }}
      </button>
    </div>
  </div>

  <div class="card">
    <div *ngIf="loading" class="state">Đang tải token...</div>

    <div *ngIf="!loading && tokens.length === 0" class="state">Không tìm thấy FCM token.</div>

    <div *ngIf="!loading && tokens.length > 0" class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>FCM Token</th>
            <th class="actions-col">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let token of tokens">
            <td>{{ token.id }}</td>
            <td>
              <code class="token" [title]="token.fcmToken">{{ token.fcmToken }}</code>
            </td>
            <td class="actions-col">
              <button
                type="button"
                class="btn-delete"
                [disabled]="deletingId === token.id"
                (click)="deleteToken(token.id)"
              >
                {{ deletingId === token.id ? 'Đang xóa...' : 'Xóa' }}
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
