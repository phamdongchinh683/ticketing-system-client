<form class="filters" [formGroup]="form" (ngSubmit)="applyFilters.emit()">
  <div class="row">
    <label class="field">
      <span class="label">Địa chỉ email</span>
      <input class="input" formControlName="email" placeholder="vd: ten@congty.com" />
      <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']"
        >Địa chỉ email không hợp lệ</span
      >
    </label>

    <label class="field">
      <span class="label">Số điện thoại</span>
      <input class="input" formControlName="phone" placeholder="vd: 0987654321" />
      <span class="error" *ngIf="form.get('phone')?.touched && form.get('phone')?.errors?.['phone10Digits']">
        Số điện thoại phải lớn hơn hoặc bằng 10 số
      </span>
    </label>

    <label class="field">
      <span class="label">Công ty</span>
      <input
        class="input"
        formControlName="companyName"
        placeholder="Tìm công ty theo tên..."
        (focus)="onCompanyFocus()"
      />
      <div class="dropdown" *ngIf="dropdownOpen" (scroll)="onScroll($event)">
        <button class="dropdown-item" type="button" (click)="selectCompany.emit(null)">
          <span class="company-name">Tất cả công ty</span>
          <span class="company-hotline">Không lọc công ty</span>
        </button>

        <div class="dropdown-loading" *ngIf="companiesLoading">Đang tải công ty...</div>

        @for (c of companies; track c.id) {
          <button class="dropdown-item" type="button" (click)="selectCompany.emit(c)">
            <span class="company-name">{{ c.name }}</span>
            <span class="company-hotline">{{ c.hotline }}</span>
          </button>
        }

        <div class="dropdown-empty" *ngIf="!companiesLoading && companies.length === 0">Không có công ty</div>
        <div class="dropdown-loading" *ngIf="companiesLoadingMore">Đang tải thêm...</div>
      </div>
      <div class="hint" *ngIf="selectedCompany">
        Đã chọn: <strong>{{ selectedCompany.name }}</strong>
        <button class="btn-link" type="button" (click)="selectCompany.emit(null)">xóa chọn</button>
      </div>
    </label>
  </div>

  <div class="row">
    <label class="field">
      <span class="label">Trạng thái</span>
      <select class="select" formControlName="status">
        <option [ngValue]="null">Chọn trạng thái</option>
        @for (s of statuses; track s) {
          <option [ngValue]="s">{{ displayStatus(s) }}</option>
        }
      </select>
    </label>

    <label class="field">
      <span class="label">Vai trò</span>
      <select class="select" formControlName="role">
        <option [ngValue]="null">Chọn vai trò</option>
        @for (r of roles; track r) {
          <option [ngValue]="r">{{ displayRole(r) }}</option>
        }
      </select>
    </label>

    <label class="field">
      <span class="label">Số dòng</span>
      <select class="select" formControlName="limit">
        @for (l of pageLimits; track l) {
          <option [ngValue]="l">{{ l }}</option>
        }
      </select>
    </label>
  </div>

  <div class="actions">
    <button class="btn" type="submit" [disabled]="listLoading">Áp dụng</button>
    <button class="btn btn--ghost" type="button" (click)="resetFilters.emit()">Đặt lại</button>
  </div>
</form>
