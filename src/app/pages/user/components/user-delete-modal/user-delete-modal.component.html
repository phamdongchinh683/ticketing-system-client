<div class="modal-overlay" [class.modal-overlay--open]="open" [attr.aria-hidden]="!open" (click)="close()">
  <div class="modal modal--sm" (click)="stopPropagation($event)">
    <h3>Xóa người dùng</h3>
    <p>
      Bạn có chắc chắn muốn xóa <strong>{{ user?.username }}</strong
      >?
    </p>
    <div class="modal-actions">
      <button class="btn btn--ghost" type="button" (click)="close()">Hủy</button>
      <button class="btn btn--danger" type="button" [disabled]="deleting" (click)="confirmDelete.emit()">
        {{ deleting ? 'Đang xóa...' : 'Xóa' }}
      </button>
    </div>
  </div>
</div>
