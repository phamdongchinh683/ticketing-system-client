<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal" (click)="stopPropagation($event)">
    <h3>Update Password</h3>
    <form class="modal-form modal-form--single" [formGroup]="form" (ngSubmit)="submitted.emit()">
      <label class="field">
        <span class="label">New Password</span>
        <div class="password-wrap">
          <input
            class="input password-input"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Abcd12345#"
          />
          <button
            class="btn-password-toggle"
            type="button"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
              <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
              <path d="M1 1l22 22" />
            </svg>
          </button>
        </div>
      </label>
      <div class="modal-actions">
        <button class="btn btn--ghost" type="button" (click)="close()">Cancel</button>
        <button class="btn" type="submit" [disabled]="submitting">{{ submitting ? 'Updating...' : 'Update Password' }}</button>
      </div>
    </form>
  </div>
</div>
