<div *ngIf="open" class="modal-overlay" (click)="close()">
  <div class="modal" (click)="stopPropagation($event)">
    <h3>Tạo người dùng</h3>
    <form class="modal-form" [formGroup]="form" (ngSubmit)="submitted.emit()">
      <label class="field">
        <span class="label">Tên đăng nhập</span>
        <input class="input" formControlName="username" placeholder="nhập tên đăng nhập" />
      </label>

      <label class="field">
        <span class="label">Họ tên</span>
        <input class="input" formControlName="fullName" placeholder="tối thiểu 7 ký tự" />
      </label>

      <label class="field">
        <span class="label">Địa chỉ email</span>
        <input class="input" formControlName="email" placeholder="vd: ten@congty.com" />
      </label>

      <label class="field">
        <span class="label">Số điện thoại</span>
        <input class="input" formControlName="phone" placeholder="vd: 0987654321" />
      </label>

      <label class="field">
        <span class="label">Mật khẩu</span>
        <div class="password-wrap">
          <input
            class="input password-input"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Abcd12345#"
          />
          <button
            class="btn-password-toggle"
            type="button"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'"
          >
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
              <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
              <path d="M1 1l22 22" />
            </svg>
          </button>
        </div>
      </label>

      <label class="field">
        <span class="label">Trạng thái</span>
        <select class="select" formControlName="status">
          @for (s of statuses; track s) {
            <option [ngValue]="s">{{ displayStatus(s) }}</option>
          }
        </select>
      </label>

      <label class="field">
        <span class="label">Vai trò</span>
        <select class="select" formControlName="role">
          @for (r of roles; track r) {
            <option [ngValue]="r">{{ displayRole(r) }}</option>
          }
        </select>
      </label>

      <div class="modal-actions">
        <button class="btn btn--ghost" type="button" (click)="close()">Hủy</button>
        <button class="btn" type="submit" [disabled]="submitting">{{ submitting ? 'Đang tạo...' : 'Tạo mới' }}</button>
      </div>
    </form>
  </div>
</div>
