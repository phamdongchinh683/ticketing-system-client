<app-notification
  *ngIf="notification.show"
  [message]="notification.message"
  [type]="notification.type"
  (closed)="notification.show = false"
/>

<div class="page">
  <div class="page-header">
    <div class="header-row">
      <h2>Người dùng trong hệ thống</h2>
      <button class="btn-create" type="button" (click)="openCreateModal()" title="Tạo người dùng" aria-label="Tạo người dùng">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
    </div>

    <app-user-filters-panel
      [form]="filters"
      [companies]="companies"
      [companiesLoading]="companiesLoading"
      [companiesLoadingMore]="companiesLoadingMore"
      [dropdownOpen]="companyDropdownOpen"
      (dropdownOpenChange)="companyDropdownOpen = $event"
      [selectedCompany]="selectedCompany"
      [statuses]="statuses"
      [roles]="roles"
      [pageLimits]="pageLimits"
      [listLoading]="loading"
      (applyFilters)="applyFilters()"
      (resetFilters)="reset()"
      (selectCompany)="selectCompany($event)"
      (companyDropdownScroll)="onCompanyDropdownScroll($event)"
    />
  </div>

  <app-user-list-panel
    [users]="users"
    [loading]="loading"
    [loadingMore]="loadingMore"
    [nextCursor]="nextCursor"
    (loadMore)="loadMore()"
    (editUser)="openEditModal($event)"
    (passwordUser)="openPasswordModal($event)"
    (deleteUser)="openDeleteModal($event)"
    (notifyUser)="openNotificationModal($event)"
  />

  <app-user-create-modal
    [open]="showCreateModal"
    [form]="createForm"
    [submitting]="creatingUser"
    [statuses]="statuses"
    [roles]="createRoles"
    (closed)="closeCreateModal()"
    (submitted)="submitCreateUser()"
  />

  <app-user-edit-modal
    [open]="showEditModal"
    [form]="editForm"
    [submitting]="editingUserLoading"
    [statuses]="statuses"
    (closed)="closeEditModal()"
    (submitted)="submitEditUser()"
  />

  <app-user-password-modal
    [open]="showPasswordModal"
    [form]="passwordForm"
    [submitting]="updatingPasswordLoading"
    (closed)="closePasswordModal()"
    (submitted)="submitUpdatePassword()"
  />

  <app-user-delete-modal
    [open]="showDeleteModal"
    [user]="selectedActionUser"
    [deleting]="deletingUserLoading"
    (closed)="closeDeleteModal()"
    (confirmDelete)="submitDeleteUser()"
  />

  <app-user-notification-modal
    [open]="showNotificationModal"
    [submitting]="notificationSubmitting"
    (closed)="closeNotificationModal()"
    (submitted)="submitNotification($event)"
  />
</div>
