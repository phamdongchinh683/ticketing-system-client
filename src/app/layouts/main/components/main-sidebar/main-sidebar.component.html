<aside class="sidebar">
  <div class="sidebar__brand">
    <div class="brand-icon">TS</div>
    <span class="brand-text">Hệ Thống Vé Xe</span>
  </div>

  <nav class="sidebar__nav">
    @for (item of items; track item.route) {
      <a
        class="nav-item"
        [class.nav-item--active]="currentUrl === item.route"
        [routerLink]="item.route"
        [title]="item.label"
      >
        <span class="nav-item__icon" [innerHTML]="asSafeIcon(item.icon)"></span>
        <span class="nav-item__label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <div class="user-block">
      <div class="user-avatar">{{ userInitial }}</div>
      <div class="user-info">
        <span class="user-name">Quản trị viên cấp cao</span>
        <span class="user-email">{{ userEmail }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
    </div>
  </div>
</aside>
