<aside class="sidebar" [class.sidebar--collapsed]="collapsed">
  <div class="sidebar__brand">
    <div class="brand-icon">TS</div>
    <span *ngIf="!collapsed" class="brand-text">Hệ thống vé</span>
  </div>

  <nav class="sidebar__nav">
    @for (item of items; track item.route) {
      <a
        class="nav-item"
        [class.nav-item--active]="currentUrl === item.route"
        [routerLink]="item.route"
        [title]="item.label"
      >
        <span class="nav-item__icon" [innerHTML]="asSafeIcon(item.icon)"></span>
        <span *ngIf="!collapsed" class="nav-item__label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <div class="user-block">
      <div class="user-avatar">{{ userInitial }}</div>
      <div *ngIf="!collapsed" class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-email">{{ userEmail }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
    </div>
    <button
      type="button"
      class="btn-collapse"
      (click)="toggleCollapse.emit()"
      title="Thu gọn/mở rộng thanh bên"
      [attr.aria-label]="collapsed ? 'Mở rộng thanh bên' : 'Thu gọn thanh bên'"
    >
      <svg [class.rotate]="collapsed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
  </div>
</aside>
