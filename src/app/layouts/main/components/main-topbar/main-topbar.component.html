<header class="topbar">
  <div class="topbar__title">{{ pageTitle }}</div>
  <div class="topbar__actions">
    <div class="notification">
      <button
        type="button"
        class="btn-notification"
        [class.btn-notification--open]="isNotificationOpen"
        [attr.aria-expanded]="isNotificationOpen"
        aria-label="Open notifications"
        (click)="toggleNotifications()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span *ngIf="unreadCount > 0" class="notification-badge">{{ unreadCount }}</span>
      </button>

      <div *ngIf="isNotificationOpen" class="notification-menu" (scroll)="onNotificationScroll($event)">
        <div class="notification-menu__header">
          <span class="notification-menu__title">Notifications</span>
          <span class="notification-menu__count" *ngIf="unreadCount > 0">{{ unreadCount }} new</span>
        </div>

        <div *ngIf="isLoadingNotifications" class="notification-state">Loading notifications...</div>
        <ng-container *ngIf="!isLoadingNotifications">
          <button
            type="button"
            class="notification-item"
            [class.notification-item--unread]="!noti.isRead"
            *ngFor="let noti of notifications; trackBy: trackByNotificationId"
            (click)="readNotification(noti)"
          >
            <span class="notification-item__content">
              <span class="notification-item__title">{{ notificationTitle(noti) }}</span>
              <span class="notification-item__body" *ngIf="notificationBody(noti)">{{ notificationBody(noti) }}</span>
            </span>
            <span class="notification-item__status" [class.notification-item__status--read]="noti.isRead">
              {{ noti.isRead ? 'Read' : 'New' }}
            </span>
          </button>

          <div *ngIf="notifications.length === 0" class="notification-state">No notifications</div>
          <div *ngIf="isLoadingMore" class="notification-state">Loading more...</div>
        </ng-container>
      </div>
    </div>

    <button type="button" class="btn-logout" (click)="signOut.emit()">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Sign Out
    </button>
  </div>
</header>
