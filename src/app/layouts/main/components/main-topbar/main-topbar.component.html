<header class="topbar">
  <div class="topbar__title">{{ pageTitle }}</div>
  <div class="topbar__actions">
    <div class="notification">
      <button
        type="button"
        class="btn-notification"
        [class.btn-notification--open]="isNotificationOpen"
        [attr.aria-expanded]="isNotificationOpen"
        aria-label="Mở thông báo"
        (click)="toggleNotifications()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span *ngIf="unreadCount > 0" class="notification-badge">{{ unreadCount }}</span>
      </button>

      <div *ngIf="isNotificationOpen" class="notification-menu" (scroll)="onNotificationScroll($event)">
        <div class="notification-menu__header">
          <span class="notification-menu__title">Thông báo</span>
          <span class="notification-menu__count" *ngIf="unreadCount > 0">{{ unreadCount }} mới</span>
        </div>

        <div *ngIf="isLoadingNotifications" class="notification-state">Đang tải thông báo...</div>
        <ng-container *ngIf="!isLoadingNotifications">
          <button
            type="button"
            class="notification-item"
            [class.notification-item--unread]="!noti.isRead"
            *ngFor="let noti of notifications; trackBy: trackByNotificationId"
            (click)="onNotificationClick(noti)"
          >
            <span class="notification-item__content">
              <span class="notification-item__title">{{ notificationTitle(noti) }}</span>
              <span class="notification-item__body" *ngIf="notificationBody(noti)">{{ notificationBody(noti) }}</span>
            </span>
            <span class="notification-item__status" [class.notification-item__status--read]="noti.isRead">
              {{ noti.isRead ? 'Đã đọc' : 'Mới' }}
            </span>
          </button>

          <div *ngIf="notifications.length === 0" class="notification-state">Không có thông báo</div>
          <div *ngIf="isLoadingMore" class="notification-state">Đang tải thêm...</div>
        </ng-container>
      </div>
    </div>

    <button type="button" class="btn-logout" (click)="signOut.emit()">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Đăng xuất
    </button>
  </div>
</header>

<div class="verify-dialog-backdrop" *ngIf="isVerifyDialogOpen" (click)="closeVerifyDialog()">
  <section class="verify-dialog" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="verify-dialog__close-top"
      aria-label="Đóng hộp thoại"
      [disabled]="isVerifyingAccount"
      (click)="closeVerifyDialog()"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
    <h3 class="verify-dialog__title">Xác minh tài khoản</h3>
    <p class="verify-dialog__body">{{ selectedNotification?.body || selectedNotification?.title || 'Không có nội dung' }}</p>

    <div class="verify-dialog__actions">
      <button
        type="button"
        class="verify-btn verify-btn--active"
        title="Đặt trạng thái hoạt động"
        aria-label="Đặt tài khoản hoạt động"
        [disabled]="isVerifyingAccount"
        (click)="submitVerifyAccount('active')"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="m8.5 12 2.5 2.5 4.5-4.5" />
        </svg>
      </button>
      <button
        type="button"
        class="verify-btn verify-btn--inactive"
        title="Đặt trạng thái tạm ngưng"
        aria-label="Đặt tài khoản tạm ngưng"
        [disabled]="isVerifyingAccount"
        (click)="submitVerifyAccount('inactive')"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M8 12h8" />
        </svg>
      </button>
      <button
        type="button"
        class="verify-btn verify-btn--banner"
        title="Đặt trạng thái cấm"
        aria-label="Đặt tài khoản cấm"
        [disabled]="isVerifyingAccount"
        (click)="submitVerifyAccount('banned')"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M8.8 8.8 15.2 15.2" />
          <path d="M15.2 8.8 8.8 15.2" />
        </svg>
      </button>
    </div>
  </section>
</div>
