<header class="topbar">
  <div class="topbar__actions">
    <div class="notification">
      <button
        type="button"
        class="btn-notification"
        [class.btn-notification--open]="isNotificationOpen"
        [attr.aria-expanded]="isNotificationOpen"
        aria-label="Mở thông báo"
        (click)="toggleNotifications()"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span *ngIf="unreadCount > 0" class="notification-badge">{{ unreadCount }}</span>
      </button>

      <div *ngIf="isNotificationOpen" class="notification-menu" (scroll)="onNotificationScroll($event)">
        <div class="notification-menu__header">
          <span class="notification-menu__title">Thông báo</span>
          <span class="notification-menu__count" *ngIf="unreadCount > 0">{{ unreadCount }} mới</span>
        </div>

        <div *ngIf="isLoadingNotifications" class="notification-state">Đang tải thông báo...</div>
        <ng-container *ngIf="!isLoadingNotifications">
          <button
            type="button"
            class="notification-item"
            [class.notification-item--unread]="!noti.isRead"
            *ngFor="let noti of notifications; trackBy: trackByNotificationId"
            (click)="onNotificationClick(noti)"
          >
            <span class="notification-item__avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
            </span>
            <span class="notification-item__content">
              <span class="notification-item__title">{{ notificationTitle(noti) }}</span>
              <span class="notification-item__body" *ngIf="notificationBody(noti)">{{ notificationBody(noti) }}</span>
            </span>
            <span class="notification-item__dot" *ngIf="!noti.isRead" aria-hidden="true"></span>
          </button>

          <div *ngIf="notifications.length === 0" class="notification-state">Không có thông báo</div>
          <div *ngIf="isLoadingMore" class="notification-state">Đang tải thêm...</div>
        </ng-container>
      </div>
    </div>

    <button type="button" class="btn-logout" (click)="signOut.emit()" aria-label="Đăng xuất">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</header>

<div class="verify-dialog-backdrop" *ngIf="isVerifyDialogOpen" (click)="closeVerifyDialog()">
  <section class="verify-dialog" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="verify-dialog__close-top"
      aria-label="Đóng hộp thoại"
      [disabled]="isVerifyingAccount"
      (click)="closeVerifyDialog()"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
    <div class="verify-dialog__head">
      <span class="verify-dialog__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3l7 4v5c0 5-3.5 8.5-7 9-3.5-.5-7-4-7-9V7l7-4z" />
          <path d="m9 12 2 2 4-4" />
        </svg>
      </span>
      <div>
        <h3 class="verify-dialog__title">Xác minh tài khoản</h3>
        <p class="verify-dialog__subtitle">Vui lòng chọn trạng thái xác minh cho tài khoản này.</p>
      </div>
    </div>
    <p class="verify-dialog__body">
      {{ selectedNotification?.body || selectedNotification?.title || 'Không có nội dung' }}
    </p>

    <div class="verify-dialog__actions">
      <button
        type="button"
        class="verify-btn verify-btn--active"
        title="Đặt trạng thái hoạt động"
        aria-label="Đặt tài khoản hoạt động"
        [disabled]="isVerifyingAccount"
        (click)="submitVerifyAccount('active')"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M20 6 9 17l-5-5" />
        </svg>
        <span class="verify-btn__label">Hoạt động</span>
      </button>
      <button
        type="button"
        class="verify-btn verify-btn--inactive"
        title="Đặt trạng thái tạm ngưng"
        aria-label="Đặt tài khoản tạm ngưng"
        [disabled]="isVerifyingAccount"
        (click)="submitVerifyAccount('inactive')"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M10 7v10" />
          <path d="M14 7v10" />
        </svg>
        <span class="verify-btn__label">Tạm ngưng</span>
      </button>
      <button
        type="button"
        class="verify-btn verify-btn--banner"
        title="Đặt trạng thái cấm"
        aria-label="Đặt tài khoản cấm"
        [disabled]="isVerifyingAccount"
        (click)="submitVerifyAccount('banned')"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M10.3 3.3 1.7 17.9c-.5.8.1 1.8 1 1.8h17.1c.9 0 1.5-1 1-1.8L13.7 3.3c-.5-.8-1.7-.8-2.2 0Z" />
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
        </svg>
        <span class="verify-btn__label">Cấm</span>
      </button>
    </div>
    <p *ngIf="verifyErrorMessage" class="verify-dialog__error">{{ verifyErrorMessage }}</p>
  </section>
</div>
