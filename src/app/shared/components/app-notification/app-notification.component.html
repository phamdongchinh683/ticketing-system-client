<div
  *ngIf="visible"
  class="notification"
  [ngClass]="['notification--' + type, isClosing ? 'notification--closing' : '']"
  (click)="close()"
  role="status"
  aria-live="polite"
>
  <div class="notification__content">
    <span class="notification__icon">{{ icon }}</span>
    <span class="notification__message">{{ message }}</span>
    <button
      type="button"
      class="notification__close"
      aria-label="Đóng thông báo"
      (click)="$event.stopPropagation(); close()"
    >
      &times;
    </button>
  </div>
</div>
