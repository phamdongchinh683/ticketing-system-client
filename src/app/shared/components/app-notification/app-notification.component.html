<div
  *ngIf="visible"
  class="notification"
  [class]="'notification--' + type"
  (click)="close()"
  role="status"
  aria-live="polite"
>
  <span class="notification__icon">{{ icon }}</span>
  <span class="notification__message">{{ message }}</span>
  <button
    type="button"
    class="notification__close"
    aria-label="Đóng thông báo"
    (click)="$event.stopPropagation(); close()"
  >
    &times;
  </button>
</div>
