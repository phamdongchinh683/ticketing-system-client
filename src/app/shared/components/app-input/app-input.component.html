<div class="field">
  <label *ngIf="label" [attr.for]="name">{{ label }}</label>
  <input
    [type]="type"
    [placeholder]="placeholder"
    [name]="name"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />
  <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>
</div>
