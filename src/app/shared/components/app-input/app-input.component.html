<div class="field">
  <label *ngIf="label" [attr.for]="name">{{ label }}</label>

  <ng-container *ngIf="type === 'password' && showPasswordToggle; else plainInput">
    <div class="password-wrap">
      <input
        class="password-input"
        [type]="effectiveType"
        [placeholder]="placeholder"
        [name]="name"
        [id]="name"
        [disabled]="disabled"
        [value]="value"
        autocomplete="current-password"
        (input)="onInput($event)"
        (blur)="onTouched()"
      />
      <button
        type="button"
        class="btn-password-toggle"
        [disabled]="disabled"
        (click)="togglePasswordVisibility()"
        title="Hiện hoặc ẩn mật khẩu"
        [attr.aria-label]="passwordVisible ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'"
      >
        <span class="sr-only">{{ passwordVisible ? 'Ẩn mật khẩu' : 'Hiện mật khẩu' }}</span>
        <svg *ngIf="!passwordVisible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <svg *ngIf="passwordVisible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.82 21.82 0 0 1 5.06-6.94" />
          <path d="M9.9 4.24A10.95 10.95 0 0 1 12 5c7 0 11 7 11 7a21.86 21.86 0 0 1-3.22 4.74" />
          <path d="M1 1l22 22" />
        </svg>
      </button>
    </div>
  </ng-container>

  <ng-template #plainInput>
    <input
      [type]="type"
      [placeholder]="placeholder"
      [name]="name"
      [id]="name"
      [disabled]="disabled"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onTouched()"
    />
  </ng-template>

  <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>
</div>
