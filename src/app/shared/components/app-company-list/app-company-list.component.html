<div class="company-list">
  <div class="company-table-wrap">
    <table class="company-table">
      <thead>
        <tr>
          <th>Logo</th>
          <th>Tên nhà xe</th>
          <th>Hotline</th>
          <th>Địa chỉ</th>
          <th class="actions-col">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        @for (company of companies; track company.id) {
          <tr>
            <td>
              <div class="company-logo">
                <img
                  *ngIf="company.logoUrl && company.logoUrl !== 'url here'"
                  [src]="company.logoUrl"
                  alt="Company logo"
                  title="Company logo"
                />
                <span *ngIf="!company.logoUrl || company.logoUrl === 'url here'" class="company-logo__fallback">
                  {{ company.name.charAt(0) }}
                </span>
              </div>
            </td>
            <td class="company-name">{{ company.name }}</td>
            <td>{{ company.hotline || '-' }}</td>
            <td class="company-address" [title]="company.address || 'Chưa có địa chỉ'">{{ company.address || 'Chưa có địa chỉ' }}</td>
            <td>
              <div class="company-actions">
                <button class="btn-icon btn-icon--edit" (click)="editCompany.emit(company)" title="Sửa">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                  </svg>
                </button>
                <button class="btn-icon btn-icon--delete" (click)="deleteCompany.emit(company)" title="Xóa">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="3 6 5 6 21 6" />
                    <path
                      d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                    />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5">
              <div class="empty-state">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                  <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <p>Không tìm thấy nhà xe</p>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
